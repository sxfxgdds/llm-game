# Beta Calibration Experiment Configuration
# ==========================================

# Temperature sweep
temperatures:
  - 0.1
  - 0.5
  - 0.7
  - 1.0
  - 1.5
  - 2.0

# Trial design
trials:
  balanced: true
  reps_per_score: 30  # For balanced design
  n_trials: 250       # For unbalanced design
  score_low: 0
  score_high: 10

# Vocabulary
vocabulary:
  n_names: 10

# Prompt settings
prompts:
  include_goal: true
  center_score: true

# Analysis settings
analysis:
  regularize: 0.25
  token_fixed_effects: false

# LLM settings
llm:
  preset: gpt4o-mini
  max_tokens: 5

# Output settings
output:
  outdir: results/beta_calibration

# Reproducibility
seed: 1234
verbosity: 1
