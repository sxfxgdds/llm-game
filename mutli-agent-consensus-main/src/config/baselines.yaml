# Baseline Model Configuration
# ============================

# Simulation parameters
simulation:
  n_agents: 24
  n_names: 10  # W=10 for convergence, W=2 for tipping
  n_rounds: 2000
  n_runs: 40
  temperature: 0.9

# Learning parameters (η+:η- ratios to test)
eta_ratios:
  - plus: 3.0
    minus: 1.0
  - plus: 2.0
    minus: 1.0
  - plus: 1.0
    minus: 1.0

# Default single ratio
eta:
  plus: 2.0
  minus: 1.0

# Tipping experiment parameters
tipping:
  fractions:
    - 0.00
    - 0.02
    - 0.04
    - 0.06
    - 0.08
    - 0.10
    - 0.12
    - 0.14
    - 0.16
    - 0.18
    - 0.20
    - 0.25
    - 0.30
    - 0.35
    - 0.40
    - 0.45
    - 0.50

# Shock experiment parameters
shock:
  shock_round: 1000  # Or fraction

# Output settings
output:
  outdir: results/baselines

# Reproducibility
seed: 12345
verbosity: 1
